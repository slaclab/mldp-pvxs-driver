# Shared runtime configuration for CI jobs; overrides below only adjust build strategy.
x-ci-common: &ci-common
    image: mldp-pvxs-driver-ci:latest
    volumes:
      - .:/workspace:cached
    depends_on:
      - mongodb
      - dp-ingestion
      - dp-query
    working_dir: /workspace
    entrypoint: []
    environment:
      - GITHUB_TOKEN
      - GIT_TERMINAL_PROMPT=0
    command: >
      bash -lc "
        echo \"Debug: Token length is $${#GITHUB_TOKEN}\" &&
        git config --global credential.helper 'store --file=/tmp/.git-credentials' &&
        printf 'url=https://github.com/slaclab/metrics-grabber.git\nusername=x-access-token\npassword=%s\n' \"$$GITHUB_TOKEN\" | git credential approve &&
        printf 'url=https://github.com/\nusername=x-access-token\npassword=%s\n' \"$$GITHUB_TOKEN\" | git credential approve &&
        rm -rf build &&
        mkdir -p build &&
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DMLDP_PVXS_DRIVER_TESTS=ON &&
        cmake --build build --config RelWithDebInfo &&
        mkdir -p build/test-results &&
        ctest --test-dir build --output-on-failure --output-junit test-results/junit.xml
      "

services:
  ci:
    <<: *ci-common
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        COMPILER: llvm
        PVXS_VERSION: 1.4.1

  ci-prebuilt:
    # Enable the `prebuilt` profile to reuse an existing image instead of rebuilding.
    <<: *ci-common
    profiles:
      - prebuilt
