# Shared runtime configuration for CI jobs; overrides below only adjust build strategy.
x-ci-common: &ci-common
    image: mldp-pvxs-driver-ci:latest
    volumes:
      - .:/workspace:cached
    depends_on:
      - mongodb
      - dp-ingestion
      - dp-query
    working_dir: /workspace
    entrypoint: []
    command: >
      bash -lc "
        rm -rf build &&
        mkdir -p build &&
        git config --global url.\"https://${GITHUB_TOKEN}:x-oauth-basic@github.com/\".insteadOf \"https://github.com/\" &&
        git config --file build/.gitconfig url.\"https://${GITHUB_TOKEN}:x-oauth-basic@github.com/\".insteadOf \"https://github.com/\" &&
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DMLDP_PVXS_DRIVER_TESTS=ON &&
        cmake --build build --config RelWithDebInfo &&
        mkdir -p build/test-results &&
        ctest --test-dir build --output-on-failure --output-junit test-results/junit.xml
      "

services:
  ci:
    <<: *ci-common 
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        COMPILER: llvm
        PVXS_VERSION: 1.4.1
    ci-prebuilt:
    # Enable the `prebuilt` profile to reuse an existing image instead of rebuilding.
        <<: *ci-common
        profiles:
          - prebuilt

        environment:
          - GITHUB_TOKEN=${GITHUB_TOKEN}

