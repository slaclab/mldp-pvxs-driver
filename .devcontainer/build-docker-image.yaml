name: Build k2eg Docker Image

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}    
jobs:
  build-docker-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: .devcontainer/Dockerfile
            variant: ubuntu
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Validate release tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag format vX.X.X, got '${GITHUB_REF_NAME}'" >&2
            exit 1
          fi
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.variant }} 
          # generate Docker tags based on the following events/attributes
          # enable only when this run was triggered by a tag ref
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            maintainer=bisegni@slac.stanford.edu
            org.opencontainers.image.title=MLDP-PVXS Driver
            org.opencontainers.image.description=MLDP-PVXS Driver to ingest EPICS data into MLDP platform
            org.opencontainers.image.vendor=SLAC National Accelerator Laboratory
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
