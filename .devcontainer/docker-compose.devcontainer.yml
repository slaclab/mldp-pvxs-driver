version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        COMPILER: llvm
        PVXS_VERSION: 1.4.1
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    # Allow debugging (gdb/lldb) inside the container
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    networks:
      - default
    # Allow the dev container to access the other services
    depends_on:
      - mongodb
      - dp-ingestion

networks:
  default:
    name: mldp_network
