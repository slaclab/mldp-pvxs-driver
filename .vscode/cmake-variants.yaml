buildType: 
  default: debug 
  description: Build Type  
  choices:
    debug:
      short: Debug 
      long: Build with debugging information 
      buildType: Debug
    release:
      short: Release 
      long: Optimize the resulting binaries
      buildType: Release
    relWithDebInfo:
      short: RelWithDebInfo 
      long: Release with debug information
      buildType: RelWithDebInfo
    minSizeRel:
      short: MinSizeRel 
      long: Release minimum size
      buildType: MinSizeRel

tests:
  default: off
  description: "Build Tests"
  choices:
    on:
      short: Tests ON
      long: Build with tests enabled
      settings: 
        MLDP_PVXS_DRIVER_TESTS: ON
    off:
      short: Tests OFF
      long: Build without tests
      settings: 
        MLDP_PVXS_DRIVER_TESTS: OFF

coverage:
  default: off
  description: "Coverage instrumentation"
  choices:
    on:
      short: Coverage ON
      long: Build with gcov-style coverage flags (forces tests ON)
      settings:
        MLDP_PVXS_DRIVER_COVERAGE: ON
        MLDP_PVXS_DRIVER_TESTS: ON
    off:
      short: Coverage OFF
      long: Build without coverage flags
      settings:
        MLDP_PVXS_DRIVER_COVERAGE: OFF

hdf5:
  default: off
  description: "HDF5 writer support"
  choices:
    on:
      short: HDF5 ON
      long: Build with HDF5 writer support (fetched from GitHub HDFGroup/hdf5 hdf5_2_1_0)
      settings:
        MLDP_PVXS_ENABLE_HDF5: ON
    off:
      short: HDF5 OFF
      long: Build without HDF5 writer support
      settings:
        MLDP_PVXS_ENABLE_HDF5: OFF

verboseMakefile:
  default: off
  description: "Verbose Makefile output"
  choices:
    on:
      short: Verbose
      long: Enable verbose makefile output
      settings:
        CMAKE_VERBOSE_MAKEFILE: ON
    off:
      short: Quiet
      long: Disable verbose makefile output
      settings:
        CMAKE_VERBOSE_MAKEFILE: OFF
