name: Build Docker Image

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build (branch, tag, or SHA). Leave empty to use the selected branch/tag in the UI."
        required: false
        default: ""
        type: string
      overwrite_release:
        description: "When true, overwrite existing release assets. Default=false => fail if release exists."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    outputs:
      manual_tag: ${{ steps.manual_tag.outputs.value }}
      manual_ref: ${{ steps.manual_tag.outputs.ref }}
      variant: ${{ steps.matrix_info.outputs.variant }}
      epics_version: ${{ steps.matrix_info.outputs.epics_version }}
      pvxs_version: ${{ steps.matrix_info.outputs.pvxs_version }}
      base_os_image: ${{ steps.matrix_info.outputs.base_os_image }}
      need_last: ${{ steps.need_last.outputs.value }}
    env:
      EPICS_VERSION: ${{ matrix.epics_version }}
      PVXS_VERSION: ${{ matrix.pvxs_version }}
      BASE_OS_IMAGE: ${{ matrix.base_os_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: .devcontainer/Dockerfile
            base_os_image: ubuntu:noble
            epics_version: R7.0.8.1
            pvxs_version: 1.4.1

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Validate release tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag format vX.X.X, got '${GITHUB_REF_NAME}'" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Compute manual image tag
        id: manual_tag
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ inputs.source_ref }}"
          if [[ -z "$ref" ]]; then
            ref="${GITHUB_REF_NAME}"
          fi

          # Docker tag charset is limited; keep it safe and predictable.
          # - Replace '/' and ':' with '-'
          # - Drop any remaining unsupported characters
          safe_ref=$(printf '%s' "$ref" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-' )
          if [[ -z "$safe_ref" ]]; then
            safe_ref="ref"
          fi

          echo "value=${safe_ref}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ref=${safe_ref}" >> "$GITHUB_OUTPUT"

      - name: Capture matrix settings
        id: matrix_info
        shell: bash
        run: |
          set -euo pipefail
          raw_variant="${{ matrix.base_os_image }}-builder-${{ matrix.epics_version }}-${{ matrix.pvxs_version }}"
          safe_variant=$(printf '%s' "$raw_variant" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-' | tr 'A-Z' 'a-z')
          if [[ -z "$safe_variant" ]]; then
            safe_variant="variant"
          fi
          echo "variant=$safe_variant" >> "$GITHUB_OUTPUT"
          echo "epics_version=${{ matrix.epics_version }}" >> "$GITHUB_OUTPUT"
          echo "pvxs_version=${{ matrix.pvxs_version }}" >> "$GITHUB_OUTPUT"
          echo "base_os_image=${{ matrix.base_os_image }}" >> "$GITHUB_OUTPUT"

      - name: Determine latest tagging requirement
        id: need_last
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" =~ ^refs/tags/ ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.manual_tag.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ steps.need_last.outputs.value == 'true' }}
          labels: |
            org.opencontainers.image.title=MLDP-PVXS Driver
            org.opencontainers.image.description=MLDP-PVXS Driver to ingest EPICS data into MLDP platform

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}:buildcache,mode=max
          build-args: |
            BASE_OS_IMAGE=${{ env.BASE_OS_IMAGE }}
            EPICS_VERSION=${{ matrix.epics_version }}
            PVXS_VERSION=${{ matrix.pvxs_version }}

  build-release-artifacts:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: build-docker-image
    permissions:
      contents: write
      packages: write
    env:
      EPICS_VERSION: ${{ needs.build-docker-image.outputs.epics_version }}
      PVXS_VERSION: ${{ needs.build-docker-image.outputs.pvxs_version }}
      RELEASE_VARIANT: ${{ needs.build-docker-image.outputs.variant }}
      BASE_OS_IMAGE: ${{ needs.build-docker-image.outputs.base_os_image }}
      NEED_LAST: ${{ needs.build-docker-image.outputs.need_last }}
    outputs:
      release_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ needs.build-docker-image.outputs.manual_ref }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          # Normalize: our release tag is always prefixed with a single 'v'.
          # If the selected ref already includes 'v' (e.g. 'v0.2.0'), drop it here.
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Compute local base image alias
        id: base_alias
        shell: bash
        run: |
          set -euo pipefail
          alias="mldp-pvxs-driver-artifact-base:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "tag=$alias" >> "$GITHUB_OUTPUT"

      - name: Compute base image
        id: base
        shell: bash
        run: |
          set -euo pipefail
          raw="${{ steps.version.outputs.version }}"
          safe=$(printf '%s' "$raw" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-')
          if [[ -z "$safe" ]]; then
            safe="ref"
          fi
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ env.RELEASE_VARIANT }}:${safe}" >> "$GITHUB_OUTPUT"

      - name: Compute artifact image
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          raw="${{ steps.version.outputs.version }}"
          safe=$(printf '%s' "$raw" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-')
          if [[ -z "$safe" ]]; then
            safe="ref"
          fi
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ env.RELEASE_VARIANT }}:artifacts-${safe}" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact tags
        id: artifact_tags
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "tags<<EOF"
            echo "${{ steps.artifact.outputs.image }}"
            if [[ "${{ env.NEED_LAST }}" == "true" ]]; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ env.RELEASE_VARIANT }}:artifacts-latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          tags: |
            ${{ steps.base.outputs.image }}
            ${{ steps.base_alias.outputs.tag }}
          load: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ env.RELEASE_VARIANT }}:buildcache
          build-args: |
            BASE_OS_IMAGE=${{ env.BASE_OS_IMAGE }}
            COMPILER=llvm
            EPICS_VERSION=${{ env.EPICS_VERSION }}
            PVXS_VERSION=${{ env.PVXS_VERSION }}

      - name: Build and push driver artifact image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile.artifacts
          push: true
          tags: ${{ steps.artifact_tags.outputs.tags }}
          build-args: |
            BASE_IMAGE=${{ steps.base_alias.outputs.tag }}
            BUILD_TYPE=Release
            RUNTIME_IMAGE=${{ env.BASE_OS_IMAGE }}

      - name: Pull artifact image for local use
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${{ steps.artifact.outputs.image }}"
          docker tag "${{ steps.artifact.outputs.image }}" mldp-pvxs-driver-artifacts:latest

      - name: Save driver artifact image
        shell: bash
        run: |
          set -euo pipefail
          docker save mldp-pvxs-driver-artifacts:latest -o driver-artifact-image.tar

      - name: Upload driver artifact image
        uses: actions/upload-artifact@v6
        with:
          name: driver-artifact-image
          path: driver-artifact-image.tar

      - name: Extract driver binary
        shell: bash
        run: |
          set -euo pipefail
          id=$(docker create mldp-pvxs-driver-artifacts:latest)
          docker cp "$id:/workspace/build/bin/mldp_pvxs_driver" ./mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}
          docker rm "$id"

      - name: Upload driver binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: driver-binary
          path: ./mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}

  create-github-release:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-release-artifacts
      - build-docker-image
    permissions:
      contents: write
    env:
      EPICS_VERSION: ${{ needs.build-docker-image.outputs.epics_version }}
      PVXS_VERSION: ${{ needs.build-docker-image.outputs.pvxs_version }}
      RELEASE_VARIANT: ${{ needs.build-docker-image.outputs.variant }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Download driver binary artifact
        uses: actions/download-artifact@v6
        with:
          name: driver-binary
          path: release-artifacts

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ needs.build-docker-image.outputs.manual_ref }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          # Normalize: our release tag is always prefixed with a single 'v'.
          # If the selected ref already includes 'v' (e.g. 'v0.2.0'), drop it here.
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create release from tag
        id: check_release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="v${{ steps.version.outputs.version }}"
          if curl -sSf -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${release_tag}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if release exists and overwrite not allowed
        if: steps.check_release.outputs.exists == 'true' && !(inputs.overwrite_release == 'true')
        run: |
          echo "Release already exists and 'overwrite_release' is false; failing as requested."
          exit 1

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          overwrite_files: ${{ inputs.overwrite_release }}
          files: |
            release-artifacts/mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}
