name: Build Docker Image

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build (branch, tag, or SHA). Leave empty to use the selected branch/tag in the UI."
        required: false
        default: ""
        type: string
      push_image:
        description: "Push the built image to GHCR (for manual test runs)."
        required: false
        default: false
        type: boolean
      overwrite_release:
        description: "When true, overwrite existing release assets. Default=false => fail if release exists."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    outputs:
      manual_tag: ${{ steps.manual_tag.outputs.value }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: .devcontainer/Dockerfile
            variant: ubuntu

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Validate release tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag format vX.X.X, got '${GITHUB_REF_NAME}'" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute manual image tag
        id: manual_tag
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ inputs.source_ref }}"
          if [[ -z "$ref" ]]; then
            ref="${GITHUB_REF_NAME}"
          fi

          # Docker tag charset is limited; keep it safe and predictable.
          # - Replace '/' and ':' with '-'
          # - Drop any remaining unsupported characters
          safe_ref=$(printf '%s' "$ref" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-' )
          if [[ -z "$safe_ref" ]]; then
            safe_ref="ref"
          fi

          echo "value=${safe_ref}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.variant }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.manual_tag.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
            # set latest tag when building on the default branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=MLDP-PVXS Driver
            org.opencontainers.image.description=MLDP-PVXS Driver to ingest EPICS data into MLDP platform

      - name: Build and push Docker image
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/slaclab/mldp-pvxs-driver:buildcache
          cache-to: type=registry,ref=ghcr.io/slaclab/mldp-pvxs-driver:buildcache,mode=max

      - name: Build Docker image locally
        if: github.event_name == 'workflow_dispatch' && !inputs.push_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/slaclab/mldp-pvxs-driver:buildcache

  create-github-release:
    if: (github.event_name == 'workflow_dispatch' && inputs.push_image) || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-docker-image
    permissions:
      contents: write
      packages: read
    env:
      EPICS_VERSION: R7.0.8.1
      PVXS_VERSION: 1.4.1
    steps:

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ needs.build-docker-image.outputs.manual_tag }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Compute base image
        id: base
        shell: bash
        run: |
          set -euo pipefail
          raw="${{ steps.version.outputs.version }}"
          safe=$(printf '%s' "$raw" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-')
          if [[ -z "$safe" ]]; then
            safe="ref"
          fi
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ubuntu:${safe}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          tags: ${{ steps.base.outputs.image }}
          load: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          build-args: |
            COMPILER=llvm
            EPICS_VERSION=${{ env.EPICS_VERSION }}
            PVXS_VERSION=${{ env.PVXS_VERSION }}

      - name: Build driver binary (Release) in artifact image
        shell: bash
        run: |
          set -euo pipefail
          BASE_IMAGE="${{ steps.base.outputs.image }}"
          docker build -f .devcontainer/Dockerfile.artifacts \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg BUILD_TYPE=Release \
            -t mldp-pvxs-driver-artifacts:latest .

      - name: Extract driver binary
        shell: bash
        run: |
          set -euo pipefail
          id=$(docker create mldp-pvxs-driver-artifacts:latest)
          docker cp "$id:/workspace/build/bin/mldp_pvxs_driver" ./mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}
          docker rm "$id"

      - name: Build AppImage (x86_64)
        if: runner.arch == 'X64'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          docker run --rm \
            -v "$PWD/out:/out" \
            -e "EPICS_VERSION=${{ env.EPICS_VERSION }}" \
            -e "PVXS_VERSION=${{ env.PVXS_VERSION }}" \
            mldp-pvxs-driver-artifacts:latest \
            bash -lc '
              set -euo pipefail

              arch=$(cat /etc/epics_host_arch || true)
              if [[ -z "${arch}" ]]; then
                arch="linux-x86_64"
              fi

              appdir=/tmp/AppDir
              rm -rf "$appdir"
              mkdir -p "$appdir/usr/bin" "$appdir/usr/lib" "$appdir/usr/share/applications" "$appdir/usr/share/icons/hicolor/256x256/apps"

              cp /workspace/build/bin/mldp_pvxs_driver "$appdir/usr/bin/mldp_pvxs_driver"

              # Bundle EPICS/PVXS runtime libs from /opt/local.
              if [[ -d "/opt/local/lib/${arch}" ]]; then
                cp -a "/opt/local/lib/${arch}"/*.so* "$appdir/usr/lib/" || true
              fi

              # Bundle all dynamic deps that ldd can resolve (best-effort).
              while IFS= read -r lib; do
                if [[ -n "$lib" && -f "$lib" ]]; then
                  cp -L "$lib" "$appdir/usr/lib/" || true
                fi
              done < <(ldd /workspace/build/bin/mldp_pvxs_driver \
                | awk "{for (i=1;i<=NF;i++) if (\$i ~ /^\//) print \$i}"
                )

              # Desktop entry + icon (required by AppImage conventions).
              if [[ -f /workspace/logos/SLAC-lab-hires.png ]]; then
                cp /workspace/logos/SLAC-lab-hires.png "$appdir/usr/share/icons/hicolor/256x256/apps/mldp_pvxs_driver.png"
              fi

              cat > "$appdir/usr/share/applications/mldp_pvxs_driver.desktop" <<EOF
              [Desktop Entry]
              Type=Application
              Name=MLDP PVXS Driver
              Exec=mldp_pvxs_driver
              Icon=mldp_pvxs_driver
              Categories=Science;
              Terminal=true
              EOF

              cat > "$appdir/AppRun" <<"EOF"
              #!/bin/sh
              set -eu
              HERE="$(dirname "$(readlink -f "$0")")"
              export LD_LIBRARY_PATH="$HERE/usr/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
              exec "$HERE/usr/bin/mldp_pvxs_driver" "$@"
              EOF
              chmod +x "$appdir/AppRun"

              # Build the AppImage without requiring FUSE by extracting appimagetool.
              curl -L -o /tmp/appimagetool.AppImage \
                https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
              chmod +x /tmp/appimagetool.AppImage
              /tmp/appimagetool.AppImage --appimage-extract >/dev/null

              out="/out/mldp_pvxs_driver-ubuntu-noble-epics-${EPICS_VERSION}-pvxs-${PVXS_VERSION}-x86_64.AppImage"
              /tmp/squashfs-root/AppRun "$appdir" "$out"
              echo "Created $out"
            '
          
      - name: Create release from tag
        id: check_release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if curl -sSf -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if release exists and overwrite not allowed
        if: steps.check_release.outputs.exists == 'true' && !(inputs.overwrite_release == 'true')
        run: |
          echo "Release for tag '${{ github.ref_name }}' already exists and 'overwrite_release' is false; failing as requested."
          exit 1

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          overwrite_files: ${{ inputs.overwrite_release }}
          files: |
            ./mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}
            ./out/mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}-pvxs-${{ env.PVXS_VERSION }}-x86_64.AppImage
