name: Build Docker Image

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build (branch, tag, or SHA). Leave empty to use the selected branch/tag in the UI."
        required: false
        default: ""
        type: string
      push_image:
        description: "Push the built image to GHCR (for manual test runs)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: .devcontainer/Dockerfile
            variant: ubuntu

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Validate release tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag format vX.X.X, got '${GITHUB_REF_NAME}'" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.variant }}
          tags: |
            type=semver,pattern={{version}},enable={{is_tag}}
            type=raw,value=${{ replace(github.ref_name, '/', '-') }}-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=MLDP-PVXS Driver
            org.opencontainers.image.description=MLDP-PVXS Driver to ingest EPICS data into MLDP platform

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          load: ${{ github.event_name == 'workflow_dispatch' && !inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-docker-image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read
    env:
      EPICS_VERSION: R7.0.8.1
      PVXS_VERSION: 1.4.1
    steps:

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute base image
        id: base
        shell: bash
        run: |
          set -euo pipefail
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ubuntu:${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Try pull base image
        id: pull
        shell: bash
        run: |
          set -euo pipefail
          BASE_IMAGE="${{ steps.base.outputs.image }}"
          echo "Pulling $BASE_IMAGE"
          if docker pull "$BASE_IMAGE"; then
            echo "pulled=true" >> "$GITHUB_OUTPUT"
          else
            echo "pulled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build base image (cached fallback)
        if: steps.pull.outputs.pulled != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          tags: ${{ steps.base.outputs.image }}
          load: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          build-args: |
            COMPILER=llvm
            EPICS_VERSION=${{ env.EPICS_VERSION }}
            PVXS_VERSION=${{ env.PVXS_VERSION }}

      - name: Build driver binary (Release) in artifact image
        shell: bash
        run: |
          set -euo pipefail
          BASE_IMAGE="${{ steps.base.outputs.image }}"
          docker build -f .devcontainer/Dockerfile.artifacts \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg BUILD_TYPE=Release \
            -t mldp-pvxs-driver-artifacts:latest .

      - name: Extract driver binary
        shell: bash
        run: |
          set -euo pipefail
          id=$(docker create mldp-pvxs-driver-artifacts:latest)
          docker cp "$id:/workspace/build/bin/mldp_pvxs_driver" ./mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}
          docker rm "$id"
          
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./mldp_pvxs_driver-ubuntu-noble-epics-${{ env.EPICS_VERSION }}
