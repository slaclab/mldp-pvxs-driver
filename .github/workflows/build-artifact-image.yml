name: Build Artifact Image

on:
  workflow_call:
    outputs:
      release_version:
        description: "Normalized release version computed from publish_version."
        value: ${{ jobs.build-artifact-image.outputs.release_version }}
    inputs:
      source_ref:
        description: "Git ref to build (branch, tag, or SHA)."
        required: false
        default: ""
        type: string
      publish_version:
        description: "Version selector (e.g. release-0.2.3, release-v0.2.3, 0.2.3, or v0.2.3)."
        required: false
        default: ""
        type: string
      base_image:
        description: "Full builder image reference used as BASE_IMAGE."
        required: true
        type: string
      runtime_variant:
        description: "Runtime image variant tag."
        required: true
        type: string
      epics_version:
        description: "EPICS version used for the build."
        required: true
        type: string
      base_os_image:
        description: "Base runtime OS image."
        required: true
        type: string
      need_last:
        description: "Whether to also publish the latest runtime tag."
        required: false
        default: false
        type: boolean
      push_image:
        description: "When false, validate artifact image builds locally without pushing."
        required: false
        default: true
        type: boolean
    secrets:
      METRICS_GRABBER_PAT:
        description: "Optional PAT for cross-repository access during Docker builds."
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-artifact-image:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.version }}
    env:
      EPICS_VERSION: ${{ inputs.epics_version }}
      RUNTIME_VARIANT: ${{ inputs.runtime_variant }}
      BASE_IMAGE: ${{ inputs.base_image }}
      BASE_OS_IMAGE: ${{ inputs.base_os_image }}
      NEED_LAST: ${{ inputs.need_last }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          raw="${{ inputs.publish_version }}"
          if [[ "$raw" =~ ^release-v?([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}-rc.${GITHUB_RUN_NUMBER}"
          elif [[ "$raw" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
          else
            echo "Unsupported publish_version: '$raw'" >&2
            echo "Expected release-X.Y.Z, release-vX.Y.Z, X.Y.Z, or vX.Y.Z" >&2
            exit 1
          fi
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Compute release image
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          raw="${{ steps.version.outputs.version }}"
          safe=$(printf '%s' "$raw" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-')
          if [[ -z "$safe" ]]; then
            safe="ref"
          fi
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/driver-${{ env.RUNTIME_VARIANT }}:v${safe}" >> "$GITHUB_OUTPUT"

      - name: Compute local artifact image alias
        id: local_artifact
        shell: bash
        run: |
          set -euo pipefail
          echo "image=mldp-pvxs-driver-artifacts:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Prepare release image tags
        id: artifact_tags
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "tags<<EOF"
            echo "${{ steps.artifact.outputs.image }}"
            if [[ "${{ env.NEED_LAST }}" == "true" ]]; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/driver-${{ env.RUNTIME_VARIANT }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push driver artifact image
        if: inputs.push_image
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_GRABBER_PAT != '' && secrets.METRICS_GRABBER_PAT || secrets.GITHUB_TOKEN }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile.artifacts
          push: true
          tags: ${{ steps.artifact_tags.outputs.tags }}
          secret-envs: |
            github_token=GITHUB_TOKEN
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BUILD_TYPE=Release
            RUNTIME_IMAGE=${{ env.BASE_OS_IMAGE }}

      - name: Build driver artifact image (validation only, no push)
        if: ${{ !inputs.push_image }}
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_GRABBER_PAT != '' && secrets.METRICS_GRABBER_PAT || secrets.GITHUB_TOKEN }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile.artifacts
          push: false
          load: true
          tags: ${{ steps.local_artifact.outputs.image }}
          secret-envs: |
            github_token=GITHUB_TOKEN
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BUILD_TYPE=Release
            RUNTIME_IMAGE=${{ env.BASE_OS_IMAGE }}

      - name: Pull artifact image for local use
        if: inputs.push_image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${{ steps.artifact.outputs.image }}"
          docker tag "${{ steps.artifact.outputs.image }}" mldp-pvxs-driver-artifacts:latest

      - name: Tag local artifact image for follow-up steps
        if: ${{ !inputs.push_image }}
        shell: bash
        run: |
          set -euo pipefail
          docker tag "${{ steps.local_artifact.outputs.image }}" mldp-pvxs-driver-artifacts:latest

      - name: Extract driver binary
        shell: bash
        run: |
          set -euo pipefail
          id=$(docker create mldp-pvxs-driver-artifacts:latest)
          docker cp "$id:/opt/local/bin/mldp_pvxs_driver" ./mldp_pvxs_driver-rockylinux-9.3-epics-${{ env.EPICS_VERSION }}
          docker rm "$id"

      - name: Upload driver binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: driver-binary
          path: ./mldp_pvxs_driver-rockylinux-9.3-epics-${{ env.EPICS_VERSION }}
