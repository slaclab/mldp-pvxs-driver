name: BuildAndTes

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
  merge_group:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build_test_ubuntu:
    name: Build Ubuntu
    needs: check-changed-file
    if: needs.check-changed-file.outputs.source_changed == 'true'
    runs-on: ubuntu-latest
    container: docker.io/ubuntu:noble
    env:
      BUILD_IMAGE: ubuntu:noble
      ARTIFACT_NAME: artifact-gcc-ubuntu
      BUILD_TYPE: Debug
      DEV_IMAGE_NAME: mldp-pvxs-driver-dev
    outputs:
      build_image: ${{ env.BUILD_IMAGE }}
      artifact_name: ${{ env.ARTIFACT_NAME }}
    steps:
      - name: Install GitVersion
        uses: GitTools/actions/gitversion/setup@v1
        with:
          versionSpec: '5.x'
      - name: Determine version
        id: gitversion
        uses: GitTools/actions/gitversion/execute@v1
      - name: Setup build system
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt update
          apt install -y \
            build-essential cmake git tclsh ninja-build gdb lcov \
            libssl-dev libsasl2-dev curl libcurl4-openssl-dev \
            valgrind libicu-dev jq file sudo pkg-config \
            python3 python3-venv python3-pip python-is-python3
      - name: Checkout source code
        uses: actions/checkout@v3
      - name: Update version header
        run: |
          cat > include/version.h <<EOF
          #pragma once

          #define MLDP_PVXS_DRIVER_VERSION_MAJOR ${{ steps.gitversion.outputs.Major }}
          #define MLDP_PVXS_DRIVER_VERSION_MINOR ${{ steps.gitversion.outputs.Minor }}
          #define MLDP_PVXS_DRIVER_VERSION_PATCH ${{ steps.gitversion.outputs.Patch }}
          #define MLDP_PVXS_DRIVER_VERSION "${{ steps.gitversion.outputs.SemVer }}"
          EOF
      - name: Build dev image
        run: docker compose -f docker-compose-test.yml build ci
      - run: git config --global --add safe.directory '*'
      - name: Configure, build, test inside dev image
        id: build
        run: |
          docker compose -f docker-compose-test.yml run --rm ci bash -lc "\
            cmake -S /workspace -B /workspace/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DENABLE_ASAN=1 -DMLDP_PVXS_DRIVER_TESTS=ON -DCMAKE_INSTALL_PREFIX=/workspace/build/local && \
            cmake --build /workspace/build --config ${{env.BUILD_TYPE}} --target install && \
            ctest --test-dir /workspace/build --output-on-failure"
      # Upload build logs even when the job fails. Use `always()` and allow the step to continue on error
      # so the overall job doesn't abort due to artifact upload issues.
      - name: Get log on failure
        if: ${{ always() && steps.build.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_NAME}}-log
          path: build/**/*.log
          retention-days: 1
