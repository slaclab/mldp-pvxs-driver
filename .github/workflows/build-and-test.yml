name: BuildAndTest

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILDKIT_CACHE_TAG: buildkitcache

permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
  merge_group:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build_test_container:
    name: Build and test
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    env:
      BUILD_TYPE: Debug
      EPICS_VERSION: ${{ matrix.epics_version }}
      PVXS_VERSION: ${{ matrix.pvxs_version }}
      BASE_OS_IMAGE: ${{ matrix.base_os_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: .devcontainer/Dockerfile
            base_os_image: rockylinux/rockylinux:9.3
            epics_version: R7.0.8.1
            pvxs_version: 1.4.1
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref }}
          persist-credentials: true

      - name: License Header Check
        id: license_add
        uses: B1NARY-GR0UP/nwa@main
        with:
          version: latest
          cmd: check
          path: .nwa-config.yaml

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Capture matrix settings
        id: matrix_info
        shell: bash
        run: |
          set -euo pipefail
          base_image_ref="${{ matrix.base_os_image }}"
          base_image_leaf="${base_image_ref##*/}"  # rockylinux:9.3
          base_image_label="${base_image_leaf//:/-}"  # rockylinux-9.3
          raw_variant="${base_image_label}-builder-${{ matrix.epics_version }}-${{ matrix.pvxs_version }}"
          safe_variant=$(printf '%s' "$raw_variant" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-' | tr 'A-Z' 'a-z')
          if [[ -z "$safe_variant" ]]; then
            safe_variant="variant"
          fi
          echo "variant=$safe_variant" >> "$GITHUB_OUTPUT"

      - name: Compute shared build image tag
        id: build_image_tag
        shell: bash
        run: |
          set -euo pipefail
          epics="${{ matrix.epics_version }}"
          epics="${epics#R}"
          pvxs="${{ matrix.pvxs_version }}"
          tag="epics-${epics}-pvxs-${pvxs}"
          safe=$(printf '%s' "$tag" | tr '/:' '--' | tr -cd 'A-Za-z0-9_.-')
          if [[ -z "$safe" ]]; then
            safe="build"
          fi
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/build:${safe}" >> "$GITHUB_OUTPUT"

      - name: Build dev image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: mldp-pvxs-driver-ci:latest
          cache-from: |
            type=registry,ref=${{ steps.build_image_tag.outputs.image }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}:${{ env.BUILDKIT_CACHE_TAG }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}:${{ env.BUILDKIT_CACHE_TAG }},mode=max
          load: true
          build-args: |
            BASE_OS_IMAGE=${{ env.BASE_OS_IMAGE }}
            COMPILER=gcc
            EPICS_VERSION=${{ env.EPICS_VERSION }}
            PVXS_VERSION=${{ env.PVXS_VERSION }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Configure, build, test inside dev image
        id: build
        env:
          # Use PAT if available (for cross-repo access), otherwise fall back to GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.METRICS_GRABBER_PAT != '' && secrets.METRICS_GRABBER_PAT || secrets.GITHUB_TOKEN }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose-test.yml --profile prebuilt up --abort-on-container-exit --exit-code-from ci-prebuilt ci-prebuilt

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: ctest
          path: build/test-results/junit.xml
          reporter: java-junit

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/test-results/
            build/Testing/

      - name: Push dev image (only if content changed)
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          dev_tag="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dev:${{ steps.matrix_info.outputs.variant }}"

          local_digest=$(docker inspect --format='{{.Id}}' mldp-pvxs-driver-ci:latest)
          remote_digest=$(docker manifest inspect "$dev_tag" 2>/dev/null \
            | jq -r '.config.digest // empty' || true)

          if [[ -n "$remote_digest" && "$local_digest" == "$remote_digest" ]]; then
            echo "Dev image unchanged ($local_digest) — skipping push."
          else
            echo "Dev image changed or not yet published — pushing $dev_tag"
            docker tag mldp-pvxs-driver-ci:latest "$dev_tag"
            docker push "$dev_tag"
          fi

      - name: Push builder image (buildcache)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}:buildcache
          cache-from: |
            type=registry,ref=${{ steps.build_image_tag.outputs.image }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}:${{ env.BUILDKIT_CACHE_TAG }}
          cache-to: |
            type=inline
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ steps.matrix_info.outputs.variant }}:${{ env.BUILDKIT_CACHE_TAG }},mode=max
          build-args: |
            BASE_OS_IMAGE=${{ env.BASE_OS_IMAGE }}
            COMPILER=gcc
            EPICS_VERSION=${{ env.EPICS_VERSION }}
            PVXS_VERSION=${{ env.PVXS_VERSION }}

  build_prerelease_docker_image:
    name: Build docker image (no push)
    if: github.event_name == 'pull_request'
    needs: build_test_container
    uses: ./.github/workflows/build-docker-image.yml
    secrets: inherit
    with:
      source_ref: ${{ github.event.pull_request.head.sha }}
      publish_version: ${{ github.head_ref }}
      push_images: false
      run_release_artifacts: false

  build_prerelease_artifact_image:
    name: Build artifact image (no push)
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-')
    needs: build_prerelease_docker_image
    uses: ./.github/workflows/build-docker-image.yml
    secrets: inherit
    with:
      source_ref: ${{ github.event.pull_request.head.sha }}
      publish_version: ${{ github.head_ref }}
      push_images: false
      run_release_artifacts: true
      push_release_artifacts: false
