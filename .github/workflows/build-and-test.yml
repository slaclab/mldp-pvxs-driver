name: BuildAndTest

permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
  merge_group:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build_test_ubuntu:
    name: Build and test
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    env:
      BUILD_TYPE: Debug
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref }}
          persist-credentials: true

      - name: License Header Add
        id: license_add
        uses: B1NARY-GR0UP/nwa@main
        with:
          version: latest
          cmd: add
          path: .nwa-config.yaml

      - name: Detect license header changes
        id: license_dirty
        run: |
          if git diff --quiet; then
            echo "dirty=false" >> "$GITHUB_OUTPUT"
          else
            echo "dirty=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit license header fixes
        id: license_autocommit
        if: steps.license_dirty.outputs.dirty == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(licenses): auto-apply headers"
          git push origin "HEAD:${{ github.head_ref }}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Fail if license headers need committing
        if: steps.license_dirty.outputs.dirty == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "License headers were updated by CI but cannot be pushed (likely a fork PR or non-PR event)."
          echo "Run ./scripts/add-licenses-include-h.sh locally and commit the changes."
          exit 1

      - name: Sync workspace to pushed commit
        if: steps.license_autocommit.outputs.pushed == 'true'
        run: |
          git fetch origin "${{ github.head_ref }}"
          git checkout "${{ github.head_ref }}"
          git reset --hard "origin/${{ github.head_ref }}"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          tags: mldp-pvxs-driver-ci:latest
          cache-from: type=registry,ref=ghcr.io/slaclab/mldp-pvxs-driver:buildcache
          cache-to: type=registry,ref=ghcr.io/slaclab/mldp-pvxs-driver:buildcache,mode=max
          load: true
          build-args: |
            COMPILER=llvm
            PVXS_VERSION=1.4.1

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Configure, build, test inside dev image
        id: build
        run: |
          docker compose -f docker-compose.yml -f docker-compose-test.yml --profile prebuilt up --abort-on-container-exit --exit-code-from ci-prebuilt ci-prebuilt

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: ctest
          path: build/test-results/junit.xml
          reporter: java-junit

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/test-results/
            build/Testing/
